      "url": "https://swaplinq.com",

      "sameAs": [
        "https://github.com/andymc-code/swaplinq"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@swaplinq.com",

        "atomic swap execution",
        "smart routing protocol"
      ]
    }

      "name": "SwaplinQ",
      "url": "https://swaplinq.com",

      "publisher": {
        "@type": "Organization",
        "name": "SwaplinQ"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",

        "query-input": "required name=search_term_string"
      }
    }
    </script>
